openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: Security event analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /provider-health:
    get:
      operationId: providerHealth
      tags: [health]
      summary: Provider health check
      description: Returns connectivity status of the configured LLM provider (e.g. Local LLM Security Engine). Never throws — always returns 200 with reachability details.
      responses:
        "200":
          description: Provider health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderHealthStatus"

  /analyze:
    post:
      operationId: analyzeEvent
      tags: [analyze]
      summary: Analyze a security event
      description: |
        Accepts a normalized security alert and returns a structured threat analysis.
        Delegates to the configured LLM provider.

        When provider_mode is local_security_engine, the request is forwarded to
        the Local LLM Security Engine (running Ollama locally, exposed via Cloudflare Tunnel).

        The response always includes fallback_used — check this before routing on
        attack_classification. A fallback result means the engine was unreachable
        or produced invalid output; the classification defaults to "unknown".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocAlert"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "422":
          description: Validation error (bad request body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "503":
          description: No LLM provider configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ProviderHealthStatus:
      type: object
      properties:
        provider_mode:
          type: string
          enum: [local_security_engine, none]
          description: Active provider mode
        configured_base_url:
          type: string
          nullable: true
          description: Value of LOCAL_LLM_ENGINE_BASE_URL, or null if not configured
        engine_reachable:
          type: boolean
          description: Whether the engine responded to the health probe
        engine_status:
          type: string
          nullable: true
          description: Engine's self-reported status ("ok" | "degraded" | null)
        model_name:
          type: string
          nullable: true
          description: Ollama model configured in the engine
        auth_configured:
          type: boolean
          description: Whether LOCAL_LLM_ENGINE_API_KEY is set on this backend
        engine_error:
          type: string
          nullable: true
          description: Error message if unreachable, null if healthy
        latency_ms:
          type: number
          nullable: true
          description: Round-trip latency to the engine's health endpoint in ms
      required:
        - provider_mode
        - engine_reachable
        - auth_configured

    SocAlert:
      type: object
      description: Normalized security alert from SIEM or security tooling
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 4000
          description: Event description or raw log summary (required)
        source_ip:
          type: string
          maxLength: 500
          description: Source IP address
        destination_ip:
          type: string
          maxLength: 500
          description: Destination IP address
        event_type:
          type: string
          maxLength: 500
          description: Event category or type (e.g. "authentication_failure")
        severity:
          type: string
          maxLength: 500
          description: Reported severity level (e.g. "high", "critical")
        timestamp:
          type: string
          maxLength: 500
          description: ISO 8601 event timestamp
        additional_context:
          type: string
          maxLength: 4000
          description: Any additional SOC context to include in the analysis
      required:
        - description

    AnalysisResult:
      type: object
      description: |
        Structured threat analysis result. Always present — never a 5xx for analysis errors.
        Check fallback_used before routing on attack_classification.
      properties:
        attack_classification:
          type: string
          enum:
            - reconnaissance
            - credential_access
            - initial_access
            - lateral_movement
            - command_and_control
            - benign
            - unknown
        false_positive_likelihood:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: "0.0 = certain real threat · 1.0 = certain false positive"
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
          description: "0 = no risk · 100 = critical"
        reason:
          type: string
          description: Short explanation; may be a fallback message if fallback_used is true
        fallback_used:
          type: boolean
          description: true if the engine was unreachable or returned invalid output
        model_used:
          type: string
          description: Ollama model that produced the result (or "none" if engine unreachable)
        provider:
          type: string
          description: Always "ollama" for the local_security_engine provider
        raw_parse_success:
          type: boolean
        parse_strategy:
          type: string
          nullable: true
        ollama_error:
          type: string
          nullable: true
        request_id:
          type: string
          nullable: true
        engine_reachable:
          type: boolean
          description: Whether the Local LLM Security Engine was reachable
        engine_error:
          type: string
          nullable: true
          description: Error if the engine was unreachable at the SOC backend level
        latency_ms:
          type: number
          nullable: true
          description: Round-trip latency to the engine in milliseconds
        contract_validation_failed:
          type: boolean
          description: |
            true when the engine returned HTTP 200 but the response body failed
            runtime schema validation. engine_reachable will be true in this case
            (we got a response), but fallback_used will also be true.
            false on all network-level fallbacks.
        soc_provider_mode:
          type: string
          description: Provider mode used for this request
      required:
        - attack_classification
        - false_positive_likelihood
        - risk_score
        - reason
        - fallback_used
        - engine_reachable
        - contract_validation_failed

    ValidationError:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
        errors:
          type: array
          items:
            type: string
        request_id:
          type: string
          nullable: true
      required:
        - error
        - detail
        - errors

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
        request_id:
          type: string
          nullable: true
      required:
        - error
        - detail
